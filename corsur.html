<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Job Application Tracker</h1>
        <p class="text-slate-600 mt-2">Track applications, interview pipeline, and rejected roles from one dashboard.</p>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
      <section aria-label="Dashboard">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <article class="card bg-white shadow-sm border border-slate-200">
            <div class="card-body">
              <h2 class="card-title text-slate-700 text-lg">Total Jobs</h2>
              <p id="dashboard-total" class="text-3xl font-extrabold text-slate-900">0</p>
            </div>
          </article>
          <article class="card bg-white shadow-sm border border-slate-200">
            <div class="card-body">
              <h2 class="card-title text-slate-700 text-lg">Interview</h2>
              <p id="dashboard-interview" class="text-3xl font-extrabold text-emerald-600">0</p>
            </div>
          </article>
          <article class="card bg-white shadow-sm border border-slate-200">
            <div class="card-body">
              <h2 class="card-title text-slate-700 text-lg">Rejected</h2>
              <p id="dashboard-rejected" class="text-3xl font-extrabold text-rose-600">0</p>
            </div>
          </article>
        </div>
      </section>

      <section class="bg-white border border-slate-200 rounded-xl p-4 md:p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
          <div>
            <h2 class="text-xl md:text-2xl font-bold text-slate-900">Available Jobs</h2>
            <p class="text-slate-600">Manage each application state from this section.</p>
          </div>
          <p class="text-sm md:text-base text-slate-700">
            Showing:
            <span id="active-tab-label" class="font-semibold">All</span>
            (<span id="active-tab-count" class="font-semibold">0</span>)
          </p>
        </div>

        <div id="tabs" class="tabs tabs-boxed bg-slate-100 mt-5 w-full md:w-fit">
          <button class="tab tab-active" data-tab="all">All <span id="tab-all" class="ml-1">(0)</span></button>
          <button class="tab" data-tab="interview">Interview <span id="tab-interview" class="ml-1">(0)</span></button>
          <button class="tab" data-tab="rejected">Rejected <span id="tab-rejected" class="ml-1">(0)</span></button>
        </div>

        <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mt-6"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
